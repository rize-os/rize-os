name: platform-test

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/platform-test.yaml'
      - 'platform/src/**'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/platform-test.yaml'
      - 'platform/src/**'

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      MAVEN_CLI_OPTS: --batch-mode --errors --fail-at-end

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: 21
          distribution: 'corretto'

      - name: Run Maven tests
        run: mvn --projects platform $MAVEN_CLI_OPTS test