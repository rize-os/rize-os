name: platform-test

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/platform-test.yaml'
      - 'platform/src/**'
      - 'platform/pom.xml'
      - 'pom.xml'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/platform-test.yaml'
      - 'platform/src/**'
      - 'platform/pom.xml'
      - 'pom.xml'

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      MAVEN_CLI_OPTS: --batch-mode --errors --fail-at-end

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'corretto'

      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}-

      - name: Run Maven tests
        run: mvn $MAVEN_CLI_OPTS -Dtest=* -pl platform -am verify